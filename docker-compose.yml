version: '3.8'

services:
  circle-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: circle-mcp-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - CIRCLE_HEADLESS_TOKEN=${CIRCLE_HEADLESS_TOKEN}
      - CIRCLE_ADMIN_V2_TOKEN=${CIRCLE_ADMIN_V2_TOKEN}
      - CIRCLE_COMMUNITY_URL=${CIRCLE_COMMUNITY_URL}
      - CIRCLE_HEADLESS_BASE_URL=${CIRCLE_HEADLESS_BASE_URL}
      - GCP_CLIENT_ID=${GCP_CLIENT_ID}
      - GCP_CLIENT_SECRET=${GCP_CLIENT_SECRET}
      - GCP_REDIRECT_URI=${GCP_REDIRECT_URI}
      - OAUTH_PORT=${OAUTH_PORT}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - READ_ONLY_MODE=${READ_ONLY_MODE:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - circle-mcp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: circle-mcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - circle-mcp
    networks:
      - circle-mcp-network

networks:
  circle-mcp-network:
    driver: bridge

volumes:
  logs:
    driver: local
